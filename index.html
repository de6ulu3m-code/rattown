<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крысо-Град: Рынок</title>
    <style>
        :root { --gold: #ffcc00; --bg: #222; }
        body {
            background-color: var(--bg); color: white;
            font-family: 'Courier New', monospace; display: flex;
            flex-direction: column; align-items: center; margin: 0; min-height: 100vh;
        }
        .city-header {
            background: #111; width: 100%; text-align: center;
            padding: 15px; border-bottom: 3px solid var(--gold);
        }
        .container {
            width: 90%; max-width: 400px; text-align: center; margin-top: 20px;
        }
        
        /* Стили игры */
        #market-game {
            background: #333; border: 3px dashed var(--gold);
            height: 300px; position: relative; overflow: hidden;
            display: none; cursor: crosshair; margin-top: 10px;
        }
        .falling-item {
            position: absolute; font-size: 30px; cursor: pointer;
            user-select: none; transition: top 0.1s linear;
        }
        
        .stat-bar { font-size: 1.2rem; margin: 10px 0; color: var(--gold); }
        .btn {
            background: #555; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; margin: 5px;
        }
        .btn:hover { background: var(--gold); color: black; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="city-header">
    <h1>🏙️ КРЫСО-ГРАД</h1>
    <div class="stat-bar">Сыр в кармане: <span id="balance">0</span> 🧀</div>
</div>

<div class="container" id="main-view">
    <div id="mayor-section">
        <div style="font-size: 50px;">🐹👔</div>
        <p id="mayor-msg">"Хочешь заработать? На рынке как раз разгружают телегу с провизией!"</p>
        <button class="btn" onclick="startMarketGame()">Пойти работать на рынок</button>
    </div>
</div>

<div class="container" id="game-view" class="hidden" style="display:none;">
    <h3>Лови еду! Осталось: <span id="timer">15</span>с</h3>
    <div id="market-game"></div>
</div>

<div style="margin-top: 30px;">
    <button class="btn" onclick="location.reload()">Центральная площадь</button>
    <a href="https://de6ulu3m-code.github.io/ratpage/" class="btn" style="text-decoration:none;">🏠 Домой во дворик</a>
</div>

<script>
    let cheeseBalance = 0;
    let gameActive = false;
    let timeLeft = 15;

    function startMarketGame() {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('market-game').style.display = 'block';
        
        gameActive = true;
        timeLeft = 15;
        spawnItems();
        
        let timerFunc = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerFunc);
                endGame();
            }
        }, 1000);
    }

    function spawnItems() {
        if (!gameActive) return;
        
        const gameZone = document.getElementById('market-game');
        const item = document.createElement('div');
        const types = ['🧀', '🌾', '🍎', '🥜'];
        
        item.className = 'falling-item';
        item.innerText = types[Math.floor(Math.random() * types.length)];
        item.style.left = Math.random() * (gameZone.offsetWidth - 30) + 'px';
        item.style.top = '-40px';
        
        gameZone.appendChild(item);

        let fallInterval = setInterval(() => {
            let top = parseInt(item.style.top);
            if (top > 300 || !gameActive) {
                clearInterval(fallInterval);
                if (item.parentNode) gameZone.removeChild(item);
            } else {
                item.style.top = (top + 5) + 'px';
            }
        }, 30);

        item.onclick = () => {
            cheeseBalance += 2; // За каждый пойманный предмет +2 сыра
            document.getElementById('balance').innerText = cheeseBalance;
            clearInterval(fallInterval);
            gameZone.removeChild(item);
        };

        setTimeout(spawnItems, 600);
    }

    function endGame() {
        gameActive = false;
        alert("Смена окончена! Ты заработал: " + cheeseBalance + " 🧀");
        document.getElementById('market-game').innerHTML = '';
        document.getElementById('market-game').style.display = 'none';
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('mayor-msg').innerText = '"Неплохо поработал! Приходи еще, когда отдохнешь."';
    }
</script>

</body>
</html>
